<script>
document.addEventListener("DOMContentLoaded", function() {
    const canvas = document.getElementById('graficaDisponibilidad');
    if (!canvas) return;

    const optimos = <?php echo json_encode($optimos); ?>;
    const noAptos = <?php echo json_encode($no_aptos); ?>;

    new Chart(canvas, {
        type: 'doughnut',
        data: {
            labels: ['Aptos para Salir', 'No Aptos'],
            datasets: [{
                data: [optimos, noAptos],
                backgroundColor: ['#2ecc71', '#e74c3c']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' },
                title: {
                    display: true,
                    text: 'Disponibilidad de Flota'
                }
            }
        }
    });
});
</script>
