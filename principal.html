</head>
<body>
    <header class="top-bar">
        <div class="system-name">MOSES SYSTEM</div>
        <!-- Mostrará el Usuario y Rol reales de la sesión -->
        <div class="user-info">
    Usuario: <?php echo $nombre_usuario; ?> | Rol: <?php echo $rol_usuario; ?>
</div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <nav>
                <a href="principal.php" class="active">Inicio</a>
                <a href="llantas.php">Llantas</a>
                <a href="unidades.php">Unidades</a>
                <a href="operadores.php">Operadores</a>
            </nav>
            <div class="sidebar-bottom">
                <a href="../index.html" class="logout-btn">Cerrar Sesión</a>
            </div>
        </aside>

        <main class="dashboard">
            <h2 class="title">Estado General de Llantas</h2>
            
            <div class="chart-flex">
                <!-- Leyenda lateral con datos de la DB -->
                <div class="legend-box">
                    <div class="legend-item"><span class="dot v"></span> Óptimas: <strong><?php echo $v; ?></strong></div>
                    <div class="legend-item"><span class="dot a"></span> Aceptables: <strong><?php echo $a; ?></strong></div>
                    <div class="legend-item"><span class="dot r"></span> Riesgozas: <strong><?php echo $r; ?></strong></div>
                </div>

                <!-- El Círculo Gigante -->
                <div class="canvas-container">
                    <canvas id="miGraficaCircular"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Capturamos los datos que vienen desde PHP
        const dataV = Number("<?php echo $v; ?>");
        const dataA = Number("<?php echo $a; ?>");
        const dataR = Number("<?php echo $r; ?>");

        // Inicializamos la gráfica
        const ctx = document.getElementById('miGraficaCircular').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut', // Estilo dona para dashboard profesional
            data: {
                labels: ['Óptimas', 'Aceptables', 'Riesgozas'],
                datasets: [{
                    data: [dataV, dataA, dataR],
                    backgroundColor: ['#4CAF50', '#FFEB3B', '#F44336'],
                    borderColor: '#000',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
