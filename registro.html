<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - MOSES</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="form-container">
    <form action="backend/registro.php" method="POST">
        <h2>Registro</h2>
        <span class="subtitle">Ingrese sus datos para registrar su cuenta</span>

        <input type="text" name="nombre" placeholder="Nombre completo" required>
        <input type="text" name="usuario" placeholder="Nombre de usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>

        <select name="rol" required>
            <option value="" disabled selected>Selecciona tu rol</option>
            <option value="A">Administrador</option>
            <option value="O">Operador</option>
            <option value="R">Reparador</option>
        </select>

        <button type="submit" class="btn-action">Registrarse</button>

        <p>¿Ya tienes una cuenta? <a href="index.html" style="color: #3182ce;">Iniciar Sesión</a></p>
        <span class="footer-link">Términos y condiciones</span>
    </form>
</div>

</body>
</html>
